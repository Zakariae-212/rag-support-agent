<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Assistant Support IA</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #f5f5f5;
}

.chat-container {
    width: 400px;
    margin: 50px auto;
    background: white;
    border-radius: 10px;
    padding: 20px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

h3 {
    text-align: center;
    margin-bottom: 20px;
}

.messages {
    height: 300px;
    overflow-y: auto;
    border: 1px solid #ddd;
    padding: 10px;
    margin: 10px 0;
    background: #fafafa;
    border-radius: 5px;
}

.user {
    text-align: right;
    margin: 5px 0;
    padding: 5px 10px;
    background: #dcf8c6;
    display: inline-block;
    border-radius: 10px;
    max-width: 80%;
    word-wrap: break-word;
}

.bot {
    text-align: left;
    margin: 5px 0;
    padding: 5px 10px;
    background: #f1f0f0;
    color: #333;
    display: inline-block;
    border-radius: 10px;
    max-width: 80%;
    word-wrap: break-word;
}

.row {
    display: flex;
    gap: 5px;
    margin-top: 10px;
}

input {
    flex: 1;
    padding: 10px;
    border-radius: 5px;
    border: 1px solid #ccc;
}

button {
    padding: 10px;
    cursor: pointer;
    border-radius: 5px;
    border: none;
    background-color: #4CAF50;
    color: white;
    font-weight: bold;
}

button:hover {
    background-color: #45a049;
}

#emailRow {
    display: none; /* Masqué par défaut */
}
</style>
</head>

<body>

<div class="chat-container">

    <h3>💬 Assistant Support</h3>

    <!-- EMAIL (masqué au départ) -->
    <div class="row" id="emailRow">
        <input type="email" id="emailInput" placeholder="Votre email">
        <button onclick="sendEmail()">Envoyer email</button>
    </div>

    <!-- CHAT -->
    <div class="messages" id="messages"></div>

    <!-- MESSAGE -->
    <div class="row">
        <input type="text" id="messageInput" placeholder="Pose ta question..." onkeydown="if(event.key==='Enter'){sendMessage();}">
        <button onclick="sendMessage()">Envoyer</button>
    </div>

</div>

<script>
let lastMessage = "";
let needEmail = false;

function addMessage(text, type) {
    const div = document.createElement("div");
    div.className = type;
    div.innerText = text;
    const messagesDiv = document.getElementById("messages");
    messagesDiv.appendChild(div);
    messagesDiv.scrollTop = messagesDiv.scrollHeight; // Scroll auto
}

async function sendMessage() {
    const input = document.getElementById("messageInput");
    const message = input.value.trim();
    if (!message) return;

    lastMessage = message;

    addMessage("👤 " + message, "user");
    input.value = "";

    try {
        const res = await fetch("http://127.0.0.1:8000/chat", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ message })
        });

        const data = await res.json();

        // ===== CAS : réponse IA directe =====
        if (data.status === "success") {

            addMessage("🤖 " + data.response, "bot");
            needEmail = false;
            document.getElementById("emailRow").style.display = "none";

        }

        // ===== CAS : demande email (création ou suppression) =====
        else if (
            data.status === "need_email" ||
            data.status === "need_email_delete"
        ) {

            addMessage("🤖 " + data.response, "bot");
            needEmail = true;
            document.getElementById("emailRow").style.display = "flex";

        }

        // ===== CAS : ticket créé =====
        else if (data.status === "ticket_created") {

            addMessage("🤖 " + data.response, "bot");
            needEmail = false;
            document.getElementById("emailRow").style.display = "none";

        }

        // ===== CAS : ticket supprimé (RGPD) =====
        else if (data.status === "ticket_deleted") {

            addMessage("🤖 " + data.response, "bot");
            needEmail = false;
            document.getElementById("emailRow").style.display = "none";

        }

        // ===== CAS : erreur =====
        else {

            console.log("Réponse inconnue du backend :", data);
            addMessage("🤖 Une erreur est survenue.", "bot");
        }

    } catch (error) {

        console.error(error);
        addMessage("🤖 Erreur de connexion au serveur.", "bot");
    }
}

async function sendEmail() {
    if (!needEmail) {
        alert("Veuillez d'abord poser une question.");
        return;
    }

    const email = document.getElementById("emailInput").value.trim();
    if (!email) {
        alert("Veuillez entrer un email.");
        return;
    }

    try {
        const res = await fetch("http://127.0.0.1:8000/chat", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ message: lastMessage, email })
        });

        const data = await res.json();
        addMessage("🤖 " + data.response, "bot");

        needEmail = false;
        document.getElementById("emailRow").style.display = "none";
        document.getElementById("emailInput").value = "";
    } catch (error) {
        console.error(error);
        addMessage("🤖 Erreur lors de l'envoi de l'email.", "bot");
    }
}
</script>

</body>
</html>
